<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eeの小屋 - 星露谷物语图鉴</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Microsoft Yahei",sans-serif;
    background:url("https://img.heliar.top/file/1774857765060_1773393845632.png") no-repeat center center fixed;
    background-size:cover;
    min-height:100vh;
    padding:20px;
    color:#333;
  }

  .header{
    text-align:center;
    margin:20px 0 30px;
  }
  .header h1{
    font-size:30px;
    color:#d887b1;
  }
  .header .desc{
    font-size:16px;
    color:#b387c1;
    margin:8px 0 16px;
  }
  .header button{
    padding:8px 16px;
    background:#fff;
    border:1px solid #e1b7d1;
    border-radius:10px;
    color:#c377a1;
    cursor:pointer;
    margin:0 4px;
  }

  .section{
    background:rgba(255,255,255,0.85);
    border-radius:14px;
    padding:18px;
    margin-bottom:20px;
  }
  .section-title{
    font-size:16px;
    color:#c377a1;
    margin-bottom:12px;
    padding-left:8px;
    border-left:3px solid #f2a7c1;
  }
  .section-bar{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-bottom:12px;
  }
  .section-bar button{
    padding:5px 10px;
    background:#fff;
    border:1px solid #e1b7d1;
    border-radius:8px;
    font-size:12px;
    color:#c377a1;
    cursor:pointer;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:12px;
  }

  .card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
  }
  .card-img{
    height:130px;
    background:#fce4ec;
    cursor:pointer;
  }
  .card-img img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .card-name{
    padding:8px;
    text-align:center;
    font-size:13px;
  }
  .card-actions{
    display:flex;
    gap:6px;
    padding:0 6px 8px;
  }
  .card-actions button{
    flex:1;
    padding:5px;
    border:none;
    background:#fce4ec;
    color:#ad1457;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
  }

  .hide{display:none}
</style>
</head>

<body>

<div class="header">
  <h1>✧ 星露谷物语图鉴 ✧</h1>
  <div class="desc">eeの小屋</div>
  <button onclick="addNewItem()">添加项目（图+文件）</button>
</div>

<!-- 6个分类 -->
<div class="section">
  <div class="section-title">UI 类</div>
  <div class="section-bar">
    <button onclick="addUi()">新建卡片</button>
  </div>
  <div class="grid" id="list-ui"></div>
</div>

<div class="section">
  <div class="section-title">光标工具类</div>
  <div class="section-bar">
    <button onclick="addCursor()">新建卡片</button>
  </div>
  <div class="grid" id="list-cursor"></div>
</div>

<div class="section">
  <div class="section-title">美化类</div>
  <div class="section-bar">
    <button onclick="addBeautify()">新建卡片</button>
  </div>
  <div class="grid" id="list-beautify"></div>
</div>

<div class="section">
  <div class="section-title">NPC 类</div>
  <div class="section-bar">
    <button onclick="addNpc()">新建卡片</button>
  </div>
  <div class="grid" id="list-npc"></div>
</div>

<div class="section">
  <div class="section-title">拓展剧情类</div>
  <div class="section-bar">
    <button onclick="addStory()">新建卡片</button>
  </div>
  <div class="grid" id="list-story"></div>
</div>

<div class="section">
  <div class="section-title">衣服美化类</div>
  <div class="section-bar">
    <button onclick="addClothes()">新建卡片</button>
  </div>
  <div class="grid" id="list-clothes"></div>
</div>

<!-- 临时上传 -->
<input type="file" id="pickImg" class="hide" accept="image/*">
<input type="file" id="pickFile" class="hide">

<script>
let currentCard = null;

// 新建项目：先选图，再选文件
function addNewItem() {
  document.getElementById('pickImg').onchange = function() {
    const imgFile = this.files[0];
    if (!imgFile) return;
    const imgUrl = URL.createObjectURL(imgFile);

    document.getElementById('pickFile').onchange = function() {
      const modFile = this.files[0];
      if (!modFile) return;
      const fileUrl = URL.createObjectURL(modFile);

      const card = `
      <div class="card">
        <div class="card-img" onclick="window.open('${fileUrl}')">
          <img src="${imgUrl}">
        </div>
        <div class="card-name">${modFile.name}</div>
        <div class="card-actions">
          <button onclick="edit(this)">编辑</button>
          <button onclick="del(this)">删除</button>
        </div>
      </div>`;

      document.getElementById('list-ui').innerHTML += card;
    };
    document.getElementById('pickFile').click();
  };
  document.getElementById('pickImg').click();
}

// 空白卡片
function addUi()    { addEmpty('list-ui') }
function addCursor(){ addEmpty('list-cursor') }
function addBeautify(){ addEmpty('list-beautify') }
function addNpc()  { addEmpty('list-npc') }
function addStory(){ addEmpty('list-story') }
function addClothes(){ addEmpty('list-clothes') }

function addEmpty(id) {
  const card = `
  <div class="card">
    <div class="card-img" onclick="bindFile(this)">📦</div>
    <div class="card-name">未命名</div>
    <div class="card-actions">
      <button onclick="edit(this)">编辑</button>
      <button onclick="del(this)">删除</button>
    </div>
  </div>`;
  document.getElementById(id).innerHTML += card;
}

// 绑定图+文件
function bindFile(imgEl) {
  currentCard = imgEl.closest('.card');
  document.getElementById('pickImg').onchange = function() {
    const f = this.files[0];
    if (!f) return;
    imgEl.innerHTML = `<img src="${URL.createObjectURL(f)}">`;

    document.getElementById('pickFile').onchange = function() {
      const mf = this.files[0];
      if (!mf) return;
      const fu = URL.createObjectURL(mf);
      imgEl.setAttribute("onclick", `window.open('${fu}')`);
      currentCard.querySelector('.card-name').innerText = mf.name;
    };
    document.getElementById('pickFile').click();
  };
  document.getElementById('pickImg').click();
}

function edit(btn) {
  const nameEl = btn.closest('.card').querySelector('.card-name');
  const t = prompt('修改名称', nameEl.innerText);
  if (t) nameEl.innerText = t;
}

function del(btn) {
  if (confirm('删除？')) btn.closest('.card').remove();
}
</script>

</body>
</html>
