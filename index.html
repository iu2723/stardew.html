<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>✨ eeの模组收藏馆 ✨ - 图片即文件</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', Roboto, sans-serif;
    background: url("https://img.heliar.top/file/1774857765060_1773393845632.png") no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    padding: 20px;
    color: #2d2d2d;
  }

  /* 主容器毛玻璃效果 */
  .main-container {
    max-width: 1300px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.88);
    border-radius: 32px;
    backdrop-filter: blur(2px);
    padding: 20px 24px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
  }

  /* 顶部栏 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px dashed #f3bfd2;
  }
  .top-bar h1 {
    font-size: 1.8rem;
    background: linear-gradient(135deg, #c46b9b, #e9a2c0);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: 1px;
  }
  .top-bar .note {
    font-size: 0.75rem;
    color: #b8608a;
    background: #ffeef4;
    padding: 4px 12px;
    border-radius: 40px;
  }

  /* 分类头部 */
  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 28px 0 12px 0;
  }
  .category-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: #b14e7a;
    background: linear-gradient(90deg, #fce4ec, transparent);
    padding: 4px 16px;
    border-radius: 30px;
    display: inline-block;
  }
  .add-card-btn {
    background: #fff0f5;
    border: 1.5px solid #e6a9c2;
    border-radius: 32px;
    padding: 5px 14px;
    font-size: 0.8rem;
    font-weight: bold;
    color: #b14e7a;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .add-card-btn:hover {
    background: #f8d9e6;
    transform: scale(0.97);
    border-color: #c76e98;
  }

  /* 网格：自适应，默认5列，小屏折叠 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 18px;
    margin-bottom: 20px;
  }

  /* 卡片风格 */
  .mod-card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
    transition: all 0.25s ease;
    cursor: pointer;
    border: 1px solid #fad5e4;
  }
  .mod-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 26px rgba(0, 0, 0, 0.15);
    border-color: #e0a1bd;
  }
  .card-img {
    height: 150px;
    background: #fceef4;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.2s;
  }
  .card-name {
    padding: 12px 6px;
    text-align: center;
    font-size: 0.85rem;
    font-weight: 500;
    background: #fffafc;
    color: #784a62;
    border-top: 1px solid #ffe2ed;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 详情页 (弹窗风格) */
  .detail-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: 0.2s;
  }
  .detail-overlay.active {
    visibility: visible;
    opacity: 1;
  }
  .detail-card {
    background: #fffef7;
    max-width: 550px;
    width: 90%;
    border-radius: 40px;
    box-shadow: 0 25px 45px rgba(0,0,0,0.3);
    overflow: hidden;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: #fbe5f0;
    border-bottom: 1px solid #f3c0d4;
  }
  .detail-header h3 {
    font-size: 1.4rem;
    color: #a5426e;
  }
  .close-detail {
    background: none;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    color: #b25f84;
    transition: 0.1s;
  }
  .detail-body {
    padding: 20px;
  }
  .detail-preview {
    text-align: center;
    margin-bottom: 20px;
  }
  .detail-preview img {
    max-width: 100%;
    max-height: 200px;
    border-radius: 28px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.1);
    border: 2px solid #ffdae8;
    background: #faf0f5;
  }
  .file-section {
    background: #fdf3f8;
    border-radius: 28px;
    padding: 20px;
    margin: 12px 0;
  }
  .file-info {
    background: white;
    border-radius: 24px;
    padding: 12px 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    border: 1px solid #f3c3d8;
  }
  .file-name {
    font-weight: 600;
    color: #b65281;
    word-break: break-all;
    flex: 1;
  }
  .download-btn {
    background: #e4a3be;
    border: none;
    padding: 8px 20px;
    border-radius: 40px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  .download-btn:hover {
    background: #c97399;
    transform: scale(0.96);
  }
  .upload-btn {
    background: #e9cfdc;
    border: 1px solid #dba2bd;
    padding: 8px 18px;
    border-radius: 40px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    color: #7c4260;
    margin-right: 8px;
    transition: 0.1s;
  }
  .danger-btn {
    background: #ffd9e6;
    border: 1px solid #e09fbb;
    color: #b1406a;
  }
  .action-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .btn-sm {
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 0.75rem;
    background: #fff;
    border: 1px solid #cf9bb5;
  }
  hr {
    margin: 14px 0;
    border-color: #fad5e4;
  }
  .empty-file {
    color: #ac7c92;
    font-style: italic;
    text-align: center;
    padding: 14px;
  }
  .tip-text {
    font-size: 0.7rem;
    color: #b07493;
    margin-top: 8px;
  }
  button {
    cursor: pointer;
  }
  @media (max-width: 700px) {
    .grid {
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .main-container {
      padding: 16px;
    }
  }
</style>
</head>
<body>

<div class="main-container">
  <div class="top-bar">
    <h1>🍎 图片即是文件 · 模组收藏架</h1>
    <div class="note">✨ 点击图片 → 下载内部MOD文件 ✨</div>
  </div>

  <!-- 动态分类容器，固定六个分类 + 支持动态新增(简单保留) -->
  <div id="categories-container"></div>
</div>

<!-- 详情浮层 -->
<div id="detailOverlay" class="detail-overlay">
  <div class="detail-card">
    <div class="detail-header">
      <h3>📦 模组文件详情</
