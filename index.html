<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eeの小屋 - 星露谷模组合集</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Microsoft Yahei",sans-serif;
    background:url("https://img.heliar.top/file/1774857765060_1773393845632.png") no-repeat center center fixed;
    background-size:cover;
    min-height:100vh;
    padding:15px;
    color:#333;
  }

  /* 顶部导航 */
  .top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }
  .top-bar h1{
    font-size:22px;
    color:#d887b1;
    text-shadow:0 0 4px rgba(255,255,255,0.5);
  }
  .top-bar button{
    padding:8px 12px;
    background:#fff;
    border:1px solid #e1b7d1;
    border-radius:8px;
    color:#c377a1;
    cursor:pointer;
    font-size:12px;
  }

  /* 分类标题 */
  .category-title{
    font-size:16px;
    color:#c377a1;
    margin:15px 0 10px 5px;
    padding-left:5px;
    border-left:3px solid #f2a7c1;
  }

  /* 网格：一排 5 个（和截图一样） */
  .grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-bottom:25px;
  }

  /* 卡片样式（模仿你给的APP截图） */
  .mod-card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:transform 0.2s;
  }
  .mod-card:hover{transform:scale(1.02)}

  .card-img{
    height:130px;
    background:#fce4ec;
  }
  .card-img img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  /* 移除了 .card-name 区域，卡片下方不再显示文字 */

  /* 详情页容器（默认隐藏） */
  #detail-page{
    display:none;
    background:#fff;
    border-radius:16px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 4px 16px rgba(0,0,0,0.15);
  }
  .detail-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    padding-bottom:10px;
    border-bottom:1px solid #f8bbd0;
  }
  .detail-header h2{color:#d887b1;font-size:18px}
  .detail-header button{
    padding:6px 10px;
    background:#f8bbd0;
    border:none;
    border-radius:6px;
    color:#c2185b;
    cursor:pointer;
  }

  /* 详情内的文件列表区域 */
  .files-list{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    margin-bottom:15px;
    max-height: 400px;
    overflow-y: auto;
  }
  .file-item{
    display:flex;
    align-items:center;
    padding:12px;
    background:#fdf2f8;
    border-radius:10px;
    border:1px solid #f8bbd0;
    justify-content: space-between;
  }
  .file-name{
    flex:1;
    font-size:13px;
    color:#c377a1;
    word-break: break-all;
  }
  .file-actions button{
    margin-left:8px;
    padding:4px 10px;
    background:#fff;
    border:1px solid #e1b7d1;
    border-radius:6px;
    color:#c377a1;
    cursor:pointer;
    font-size:12px;
  }
  .add-file-btn{
    margin-top:15px;
    padding:8px;
    background:#fce4ec;
    border:none;
    border-radius:6px;
    color:#ad1457;
    cursor:pointer;
    width:100%;
  }
  .empty-files{
    text-align:center;
    color:#c377a1;
    padding:20px;
  }

  /* 隐藏上传 */
  #img-picker, #file-picker{display:none}
</style>
</head>

<body>

<!-- 列表页面 -->
<div id="list-page">
  <div class="top-bar">
    <h1>✧ 星露谷模组合集 ✧</h1>
    <button onclick="addNewCategory()">新建分类</button>
  </div>

  <!-- 分类：UI 类 -->
  <div class="category-title">UI 类</div>
  <div class="grid" id="cat-ui"></div>

  <!-- 分类：光标工具类 -->
  <div class="category-title">光标工具类</div>
  <div class="grid" id="cat-cursor"></div>

  <!-- 分类：美化类 -->
  <div class="category-title">美化类</div>
  <div class="grid" id="cat-beautify"></div>

  <!-- 分类：NPC 类 -->
  <div class="category-title">NPC 类</div>
  <div class="grid" id="cat-npc"></div>

  <!-- 分类：拓展剧情类 -->
  <div class="category-title">拓展剧情类</div>
  <div class="grid" id="cat-story"></div>

  <!-- 分类：衣服美化类 -->
  <div class="category-title">衣服美化类</div>
  <div class="grid" id="cat-clothes"></div>
</div>

<!-- 详情页面 -->
<div id="detail-page">
  <div class="detail-header">
    <h2 id="detail-title">项目详情</h2>
    <button onclick="showList()">返回</button>
  </div>
  <div id="file-list-container" class="files-list"></div>
  <button class="add-file-btn" onclick="addFileToCurrentCard()">+ 添加文件</button>
  <button class="add-file-btn" style="margin-top:8px; background:#f8bbd0;" onclick="replaceCardImage()">🖼️ 更换封面图</button>
</div>

<!-- 隐藏控件 -->
<input type="file" id="img-picker" accept="image/*">
<input type="file" id="file-picker" multiple>

<script>
// ======================= 数据结构 =======================
// 全局存储: { categoryId: [ 卡片对象 ] }
// 卡片对象: { id, imageBase64, files: [ { name, base64, type } ] }
let appData = {};

// 当前正在编辑的卡片
let currentDetailCard = null;      // DOM 元素
let currentCardId = null;          // 卡片ID
let currentCategoryId = null;      // 所属分类

// 初始化默认分类
const categories = ['ui', 'cursor', 'beautify', 'npc', 'story', 'clothes'];
categories.forEach(cat => {
  if (!appData[cat]) appData[cat] = [];
});

// ======================= 加载/保存 localStorage =======================
function saveToLocalStorage() {
  localStorage.setItem('mod_multi_data', JSON.stringify(appData));
}

function loadFromLocalStorage() {
  const stored = localStorage.getItem('mod_multi_data');
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      // 确保每个分类都有数组
      categories.forEach(cat => {
        if (!parsed[cat]) parsed[cat] = [];
      });
      appData = parsed;
    } catch(e) { console.warn(e); initDefaultData(); }
  } else {
    initDefaultData();
  }
  // 渲染所有分类
  renderAllCategories();
}

// 默认示例数据（苹果卡片带两个示例文件）
function initDefaultData() {
  const demoAppleImg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23fde047'/%3E%3Ctext x='50' y='70' font-size='52' text-anchor='middle' fill='%23b45309'%3E🍎%3C/text%3E%3C/svg%3E";
  const exampleFile1 = "data:text/plain;base64,VGhpcyBpcyBhbiBleGFtcGxlIE1PRCBmaWxlIDEu";
  const exampleFile2 = "data:text/plain;base64,U2Vjb25kIGV4YW1wbGUgZmlsZSBmb3IgZGVtby4=";
  appData.beautify.push({
    id: 'demo_' + Date.now(),
    imageBase64: demoAppleImg,
    files: [
      { name: '说明文档.txt', base64: exampleFile1, type: 'text/plain' },
      { name: '贴图包示例.txt', base64: exampleFile2, type: 'text/plain' }
    ]
  });
  saveToLocalStorage();
}

// ======================= 渲染所有分类 =======================
function renderAllCategories() {
  for (let cat of categories) {
    const grid = document.getElementById(`cat-${cat}`);
    if (!grid) continue;
    const cards = appData[cat] || [];
    grid.innerHTML = '';
    cards.forEach(card => {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'mod-card';
      cardDiv.setAttribute('data-id', card.id);
      cardDiv.setAttribute('data-cat', cat);
      const imgSrc = card.imageBase64 || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="1
