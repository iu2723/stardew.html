<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eeの小屋 - 星露谷模组合集</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Microsoft Yahei",sans-serif;
    background:url("https://img.heliar.top/file/1774857765060_1773393845632.png") no-repeat center center fixed;
    background-size:cover;
    min-height:100vh;
    padding:15px;
    color:#333;
  }

  /* 顶部导航 */
  .top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }
  .top-bar h1{
    font-size:22px;
    color:#d887b1;
    text-shadow:0 0 4px rgba(255,255,255,0.5);
  }
  .top-bar button{
    padding:8px 12px;
    background:#fff;
    border:1px solid #e1b7d1;
    border-radius:8px;
    color:#c377a1;
    cursor:pointer;
    font-size:12px;
  }

  /* 分类标题 */
  .category-title{
    font-size:16px;
    color:#c377a1;
    margin:15px 0 10px 5px;
    padding-left:5px;
    border-left:3px solid #f2a7c1;
  }

  /* 网格：一排 5 个（和截图一样） */
  .grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-bottom:25px;
  }

  /* 卡片样式（模仿你给的APP截图） */
  .mod-card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:transform 0.2s;
  }
  .mod- card:hover{transform:scale(1.02)}

  .card-img{
    height:130px;
    background:#fce4ec;
  }
  .card-img img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .card-name{
    padding:8px;
    text-align:center;
    font-size:13px;
    color:#555;
    background:#fdf2f8;
  }

  /* 详情页容器（默认隐藏） */
  #detail-page{
    display:none;
    background:#fff;
    border-radius:16px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 4px 16px rgba(0,0,0,0.15);
  }
  .detail-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    padding-bottom:10px;
    border-bottom:1px solid #f8bbd0;
  }
  .detail-header h2{color:#d887b1;font-size:18px}
  .detail-header button{
    padding:6px 10px;
    background:#f8bbd0;
    border:none;
    border-radius:6px;
    color:#c2185b;
    cursor:pointer;
  }

  /* 详情内的链接格子 */
  .link-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
  }
  .link-item{
    display:flex;
    align-items:center;
    padding:12px;
    background:#fdf2f8;
    border-radius:10px;
    border:1px solid #f8bbd0;
  }
  .link-item input{
    flex:1;
    padding:8px;
    border:1px solid #e1b7d1;
    border-radius:6px;
    margin-right:10px;
    font-size:13px;
  }
  .link-item button{
    padding:6px 10px;
    background:#fff;
    border:1px solid #e1b7d1;
    border-radius:6px;
    color:#c377a1;
    cursor:pointer;
    font-size:12px;
  }

  /* 隐藏上传 */
  #img-picker, #file-picker{display:none}
</style>
</head>

<body>

<!-- 列表页面 -->
<div id="list-page">
  <div class="top-bar">
    <h1>✧ 星露谷模组合集 ✧</h1>
    <button onclick="addNewCategory()">新建分类</button>
  </div>

  <!-- 分类：UI 类 -->
  <div class="category-title">UI 类</div>
  <div class="grid" id="cat-ui"></div>

  <!-- 分类：光标工具类 -->
  <div class="category-title">光标工具类</div>
  <div class="grid" id="cat-cursor"></div>

  <!-- 分类：美化类 -->
  <div class="category-title">美化类</div>
  <div class="grid" id="cat-beautify"></div>

  <!-- 分类：NPC 类 -->
  <div class="category-title">NPC 类</div>
  <div class="grid" id="cat-npc"></div>

  <!-- 分类：拓展剧情类 -->
  <div class="category-title">拓展剧情类</div>
  <div class="grid" id="cat-story"></div>

  <!-- 分类：衣服美化类 -->
  <div class="category-title">衣服美化类</div>
  <div class="grid" id="cat-clothes"></div>
</div>

<!-- 详情页面 -->
<div id="detail-page">
  <div class="detail-header">
    <h2 id="detail-title">项目详情</h2>
    <button onclick="showList()">返回</button>
  </div>
  <div class="link-grid" id="link-container"></div>
  <button style="margin-top:15px;padding:8px;background:#fce4ec;border:none;border-radius:6px;color:#ad1457;cursor:pointer" onclick="addLink()">+ 添加链接</button>
</div>

<!-- 隐藏控件 -->
<input type="file" id="img-picker" accept="image/*">
<input type="file" id="file-picker" multiple>

<script>
let currentDetailCard = null; // 当前操作的详情卡片
let currentCategory = '';      // 当前所属分类

// ---- 1. 核心：添加一个图片卡片（入口） ----
function addCard(categoryId) {
  currentCategory = categoryId;
  
  // 上传图片
  document.getElementById('img-picker').onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const imgUrl = URL.createObjectURL(file);
    
    // 创建卡片HTML
    const cardHtml = `
      <div class="mod-card" onclick="showDetail(this)">
        <div class="card-img"><img src="${imgUrl}"></div>
        <div class="card-name">点击进入</div>
      </div>
    `;
    
    document.getElementById(`cat-${categoryId}`).innerHTML += cardHtml;
  };
  
  document.getElementById('img-picker').click();
}

// 给6个分类绑定添加按钮（方便扩展）
window.addNewCategory = function() {
  const cat = prompt("输入分类ID（如: ui）", "ui");
  if(cat){
    const section = document.createElement('div');
    section.className = 'category-title';
    section.innerText = cat + '类';
    document.body.appendChild(section);
    
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.id = `cat-${cat}`;
    document.body.appendChild(grid);
    
    // 自动给这个分类加一个添加按钮
    alert(`分类 "${cat}" 创建成功！请刷新页面，然后通过代码手动添加：addCard('${cat}')`);
  }
}

// ---- 2. 核心：点图片进入详情页 ----
function showDetail(cardEl) {
  currentDetailCard = cardEl;
  
  // 显示详情页，隐藏列表页
  document.getElementById('list-page').style.display = 'none';
  document.getElementById('detail-page').style.display = 'block';
  
  // 这里可以加载该卡片之前保存的链接（如果有）
  // 目前是空白，你可以自己加
}

// ---- 3. 核心：详情页返回 ----
function showList() {
  document.getElementById('list-page').style.display = 'block';
  document.getElementById('detail-page').style.display = 'none';
}

// ---- 4. 核心：添加链接 ----
function addLink() {
  const linkHtml = `
    <div class="link-item">
      <input type="text" placeholder="输入链接或文件名" value="https://">
      <button onclick="this.parentElement.remove()">删除</button>
    </div>
  `;
  document.getElementById('link-container').innerHTML += linkHtml;
}

// ---- 5. 辅助：监听文件导入（如果需要上传文件而不是链接） ----
// 你可以根据需要选择是用“链接”还是“上传文件”
// 目前版本是“链接模式”，点进详情页可以自己加多个链接
</script>

</body>
</html>
