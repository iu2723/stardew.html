<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星露谷物语图鉴 - ee的小屋</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Microsoft Yahei",sans-serif;
    background: url('https://img.heliar.top/file/1774857765060_1773393845632.png') no-repeat center center fixed;
    background-size: cover;
    min-height:100vh;color:#444;padding:20px;
  }
  .header{text-align:center;margin:30px 0}
  .header h1{font-size:32px;color:#d8a7d1;margin-bottom:10px}
  .header .subtitle{font-size:18px;color:#b39ddb;margin-bottom:20px}
  .btn{
    padding:8px 14px;background:#fff;
    border:1px solid #f48fb1;color:#d8a7d1;
    border-radius:10px;cursor:pointer;
    margin:0 5px;font-size:14px;
  }
  .section{
    background:rgba(255,255,255,0.85);
    border-radius:16px;padding:20px;margin:20px 0;
    box-shadow:0 4px 12px rgba(200,180,220,0.15)
  }
  .section-title{
    font-size:17px;color:#d8a7d1;
    margin-bottom:15px;padding-left:10px;
    border-left:3px solid #f48fb1;
  }
  .section-header{
    display:flex;justify-content:flex-end;gap:10px;
    margin-bottom:15px;
  }
  .card-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;margin-top:10px;
  }
  .card{
    background:#fff;border-radius:12px;overflow:hidden;
    box-shadow:0 2px 8px rgba(200,180,220,0.1);
    cursor:pointer;
  }
  .card-img{
    height:140px;background:#fce4ec;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;color:#fff;
  }
  .card-img img{
    width:100%;height:100%;object-fit:cover;
    display:block;
  }
  .card-info{padding:12px}
  .card-name{
    font-size:14px;margin-bottom:10px;
    padding:6px 8px;width:100%;
    border:1px solid #eee;border-radius:6px;
  }
  .card-actions{
    display:flex;gap:8px;
  }
  .card-actions button{
    flex:1;padding:6px;border:none;
    background:#fce4ec;color:#ad1457;
    border-radius:6px;cursor:pointer;
  }

  /* 大图预览弹窗 */
  .modal{
    position:fixed;top:0;left:0;
    width:100vw;height:100vh;
    background:rgba(0,0,0,0.7);
    display:flex;align-items:center;justify-content:center;
    z-index:999;
    display:none;
  }
  .modal img{
    max-width:90%;max-height:90%;
    border-radius:10px;
  }
  .modal.active{display:flex}

  #fileInput{display:none}
</style>
</head>

<body>
<div class="header">
  <h1>✨ 星露谷物语图鉴 ✨</h1>
  <p class="subtitle">ee的小屋</p>
  <button class="btn" onclick="document.getElementById('fileInput').click()">添加项目（图片+文件）</button>
  <input type="file" id="fileInput" multiple accept="*">
</div>

<!-- 弹窗：点击图片放大查看 -->
<div class="modal" id="previewModal" onclick="closeModal()">
  <img id="previewImg">
</div>

<div class="section">
  <div class="section-title">UI 类</div>
  <div class="section-header">
    <button class="btn" onclick="addCard('ui')">新建项目</button>
  </div>
  <div class="card-grid" id="ui"></div>
</div>

<div class="section">
  <div class="section-title">光标工具类</div>
  <div class="section-header">
    <button class="btn" onclick="addCard('cursor')">新建项目</button>
  </div>
  <div class="card-grid" id="cursor"></div>
</div>

<div class="section">
  <div class="section-title">美化类</div>
  <div class="section-header">
    <button class="btn" onclick="addCard('beautify')">新建项目</button>
  </div>
  <div class="card-grid" id="beautify"></div>
</div>

<div class="section">
  <div class="section-title">NPC 类</div>
  <div class="section-header">
    <button class="btn" onclick="addCard('npc')">新建项目</button>
  </div>
  <div class="card-grid" id="npc"></div>
</div>

<div class="section">
  <div class="section-title">拓展剧情类</div>
  <div class="section-header">
    <button class="btn" onclick="addCard('story')">新建项目</button>
  </div>
  <div class="card-grid" id="story"></div>
</div>

<div class="section">
  <div class="section-title">衣服美化类</div>
  <div class="section-header">
    <button class="btn" onclick="addCard('clothes')">新建项目</button>
  </div>
  <div class="card-grid" id="clothes"></div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const previewModal = document.getElementById('previewModal');
const previewImg = document.getElementById('previewImg');

// 添加项目（图片+文件）
fileInput.addEventListener('change', e => {
  const files = e.target.files;
  if (!files.length) return;

  for (let file of files) {
    const url = URL.createObjectURL(file);
    const card = `
      <div class="card" onclick="openPreview('${url}')">
        <div class="card-img">
          <img src="${url}">
        </div>
        <div class="card-info">
          <input class="card-name" type="text" value="${file.name}">
          <div class="card-actions">
            <button onclick="del(event,this)">删除</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('ui').innerHTML += card;
  }
});

// 新建空白项目卡片
function addCard(cateId) {
  const card = `
    <div class="card">
      <div class="card-img">📦</div>
      <div class="card-info">
        <input class="card-name" type="text" placeholder="输入名称">
        <div class="card-actions">
          <button onclick="del(event,this)">删除</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById(cateId).innerHTML += card;
}

// 打开大图预览
function openPreview(url) {
  previewImg.src = url;
  previewModal.classList.add('active');
}

// 关闭大图
function closeModal() {
  previewModal.classList.remove('active');
}

// 删除卡片（阻止冒泡）
function del(e, btn) {
  e.stopPropagation();
  if (confirm('确定删除此项目？')) {
    btn.closest('.card').remove();
  }
}
</script>
</body>
</html>
